<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSL Compiler Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --error: #ef4444;
            --panel-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 14px 0 var(--accent-glow);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px 0 var(--accent-glow);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        main {
            display: flex;
            flex: 1;
            padding: 1.5rem;
            gap: 1.5rem;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--panel-radius);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .editor-container {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 1.5rem;
            border: none;
            resize: none;
            outline: none;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            overflow-x: auto;
        }

        .tab {
            padding: 1rem 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .tab:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .output-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e2e8f0;
            background: #0b1120;
            white-space: pre-wrap;
        }

        .output-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .output-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }
        
        .status-dot.success {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }
        
        .status-dot.error {
            background-color: var(--error);
            box-shadow: 0 0 8px var(--error);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3); 
        }
    </style>
</head>
<body>

    <header>
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#60a5fa" />
                        <stop offset="100%" stop-color="#a78bfa" />
                    </linearGradient>
                </defs>
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            DSL Compiler Simulator
        </h1>
        <div class="status-indicator">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Ready</span>
        </div>
        <button id="compile-btn" class="btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            Run Compiler
            <div id="spinner" class="spinner"></div>
        </button>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header">
                <span>Source Code (sample.dsl)</span>
            </div>
            <div class="editor-container">
                <textarea id="code-editor" spellcheck="false">var a = 0
var b = 10
var c = 0

cycle (a = 0; a < b; a = a + 1) {
    check (a == 5) {
        c = c + a
    } otherwise {
        c = c + 1
    }

    repeat (c < 5) {
        c = c + 1
    }
}
printx c</textarea>
            </div>
        </div>

        <div class="panel">
            <div class="tabs">
                <div class="tab active" data-target="output">Output</div>
                <div class="tab" data-target="lexical">Lexical Analysis</div>
                <div class="tab" data-target="syntax">Syntax</div>
                <div class="tab" data-target="semantic">Semantic</div>
                <div class="tab" data-target="symbol">Symbol Table</div>
                <div class="tab" data-target="tac">TAC</div>
            </div>
            <div class="output-container" id="output-container">
                <div id="output" class="output-section active">Compile the code to see output here.</div>
                <div id="lexical" class="output-section"></div>
                <div id="syntax" class="output-section"></div>
                <div id="semantic" class="output-section"></div>
                <div id="symbol" class="output-section"></div>
                <div id="tac" class="output-section"></div>
            </div>
        </div>
    </main>

    <script>
        // Tab switching logic
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.output-section');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove active class from all
                tabs.forEach(t => t.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));

                // Add active class to clicked tab and corresponding section
                tab.classList.add('active');
                const targetId = tab.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });

        // Compile logic
        const compileBtn = document.getElementById('compile-btn');
        const editor = document.getElementById('code-editor');
        const spinner = document.getElementById('spinner');
        const btnText = compileBtn.childNodes[2]; // The text node "Run Compiler"
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        compileBtn.addEventListener('click', async () => {
            const code = editor.value;
            
            // UI Loading state
            compileBtn.disabled = true;
            spinner.style.display = 'block';
            compileBtn.querySelector('svg').style.display = 'none';
            btnText.textContent = ' Compiling...';
            statusText.textContent = 'Compiling...';
            statusDot.className = 'status-dot';

            try {
                const response = await fetch('/compile', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (data.success) {
                    // Update sections
                    document.getElementById('lexical').textContent = data.sections.lexical || 'No output';
                    document.getElementById('syntax').textContent = data.sections.syntax || 'No output';
                    document.getElementById('semantic').textContent = data.sections.semantic || 'No output';
                    document.getElementById('symbol').textContent = data.sections.symbol || 'No output';
                    document.getElementById('tac').textContent = data.sections.tac || 'No output';
                    document.getElementById('output').textContent = data.sections.output || 'No output';
                    
                    statusDot.className = 'status-dot success';
                    statusText.textContent = 'Compiled Successfully';
                } else {
                    document.getElementById('output').textContent = 'Error: ' + data.error;
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Compilation Failed';
                    
                    // Switch to output tab to show error
                    tabs[0].click();
                }
            } catch (err) {
                document.getElementById('output').textContent = 'Request Error: ' + err.message;
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Server Error';
            } finally {
                // Restore UI
                compileBtn.disabled = false;
                spinner.style.display = 'none';
                compileBtn.querySelector('svg').style.display = 'block';
                btnText.textContent = ' Run Compiler';
            }
        });
    </script>
</body>
</html>
